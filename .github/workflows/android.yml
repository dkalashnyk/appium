name: Android Tests

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  android-tests:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Enable KVM
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' \
            | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Install dependencies
        run: npm ci

      - name: Install Appium driver
        run: npx appium driver install uiautomator2

      - name: Run tests
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: 33
          arch: x86_64
          profile: pixel_6
          emulator-options: -no-window -no-audio -no-boot-anim
          script: |
            adb wait-for-device shell 'while [[ -z $(getprop sys.boot_completed) ]]; do sleep 3; done'
            adb install-multiple apps/base.apk apps/split_config.x86_64.apk apps/split_config.xxhdpi.apk
            npx wdio run config/wdio.android.config.ts
        env:
          APP_PACKAGE: com.megogo.application
          APP_ACTIVITY: net.megogo.app.main.MainActivity
          APP_PATH: ./apps/base.apk

      - name: Get Allure history
        if: always()
        uses: actions/checkout@v4
        with:
          ref: gh-pages
          path: gh-pages
        continue-on-error: true

      - name: Generate Allure report
        if: always()
        uses: simple-elf/allure-report-action@master
        with:
          allure_results: allure-results
          allure_history: allure-history
          keep_reports: 20

      - name: Publish Allure to GitHub Pages
        if: always()
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_branch: gh-pages
          publish_dir: allure-history

      - name: Publish JUnit results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: junit-results
          path: junit-results/

      - name: Publish test report
        if: always()
        uses: dorny/test-reporter@v1
        with:
          name: WDIO Test Results
          path: junit-results/*.xml
          reporter: java-junit
