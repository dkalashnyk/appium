name: Android Tests

on:
  push:
    branches: [main]
  pull_request:

jobs:
  android-tests:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Enable KVM
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' \
            | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Install dependencies
        run: npm ci

      - name: Install Appium
        run: |
          npm install -g appium
          appium driver install uiautomator2

      - name: Run tests
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: 33
          arch: x86_64
          profile: pixel_6
          emulator-options: -no-window -no-audio -no-boot-anim
          script: |
            adb install-multiple apps/base.apk apps/split_config.x86_64.apk apps/split_config.xxhdpi.apk
            APPIUM_HOST=localhost npx wdio run config/wdio.android.config.ts &
            appium --port 4723 &
            wait
        env:
          APP_PACKAGE: com.megogo.application
          APP_ACTIVITY: net.megogo.app.main.MainActivity
          APP_PATH: ./apps/base.apk

      - name: Publish JUnit results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: junit-results
          path: junit-results/

      - name: Publish test report
        if: always()
        uses: dorny/test-reporter@v1
        with:
          name: WDIO Test Results
          path: junit-results/*.xml
          reporter: java-junit

      - name: Upload Allure results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: allure-results
          path: allure-results/
